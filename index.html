<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entropy</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { overflow:hidden; background:#08001a; font-family:'Courier New',monospace; }
  canvas { position:absolute; top:0; left:0; }
  #bg { z-index:0; }
  #fg { z-index:1; cursor:none; }
  #clearBtn {
    position:fixed; z-index:10; top:24px; right:24px;
    background:transparent; border:1px solid #ff71ce;
    color:#ff71ce; padding:10px 22px;
    font-family:'Courier New',monospace; font-size:11px;
    letter-spacing:4px; cursor:pointer; text-transform:uppercase;
    box-shadow:0 0 18px #ff71ce33; transition:all .2s;
  }
  #clearBtn:hover { background:#ff71ce14; box-shadow:0 0 34px #ff71ce55; }
  #hint {
    position:fixed; z-index:10; bottom:26px; left:26px;
    color:#b566ff55; font-size:11px; letter-spacing:3px;
    pointer-events:none; transition:color .4s;
  }
  #hint.pop { color:#ff71cecc; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="fg"></canvas>
<button id="clearBtn">✕  CLEAR</button>
<div id="hint">draw a shape</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
// ── Canvas ───────────────────────────────────────────────────────
const bgC = document.getElementById('bg'), bgX = bgC.getContext('2d');
const fgC = document.getElementById('fg'), gx  = fgC.getContext('2d');
let W = innerWidth, H = innerHeight;

function setSize() {
  W = innerWidth; H = innerHeight;
  bgC.width = fgC.width = W;
  bgC.height = fgC.height = H;
  drawRoom();
}
setSize();
addEventListener('resize', setSize);

// ── Vaporwave room ───────────────────────────────────────────────
function drawRoom() {
  const c = bgX;
  c.clearRect(0, 0, W, H);

  // back-wall portal corners
  const bwl = W * .13, bwr = W * .87;
  const bwt = H * .04, bwb = H * .73;

  // base fill
  const base = c.createLinearGradient(0, 0, 0, H);
  base.addColorStop(0,   '#09001c');
  base.addColorStop(.44, '#190034');
  base.addColorStop(1,   '#0c0018');
  c.fillStyle = base; c.fillRect(0, 0, W, H);

  // ceiling
  c.beginPath();
  c.moveTo(0,0); c.lineTo(W,0); c.lineTo(bwr,bwt); c.lineTo(bwl,bwt);
  c.fillStyle = '#100025'; c.fill();

  // floor
  c.beginPath();
  c.moveTo(0,H); c.lineTo(W,H); c.lineTo(bwr,bwb); c.lineTo(bwl,bwb);
  const fg = c.createLinearGradient(0,bwb,0,H);
  fg.addColorStop(0,'#1a003c'); fg.addColorStop(1,'#0b001e');
  c.fillStyle = fg; c.fill();

  // left wall
  c.beginPath();
  c.moveTo(0,0); c.lineTo(bwl,bwt); c.lineTo(bwl,bwb); c.lineTo(0,H);
  c.fillStyle = '#110026'; c.fill();

  // right wall
  c.beginPath();
  c.moveTo(W,0); c.lineTo(bwr,bwt); c.lineTo(bwr,bwb); c.lineTo(W,H);
  c.fillStyle = '#110026'; c.fill();

  // back wall
  c.fillStyle = '#1d003e';
  c.fillRect(bwl, bwt, bwr-bwl, bwb-bwt);

  function line(x1,y1,x2,y2,a) {
    c.globalAlpha = a; c.beginPath();
    c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke();
  }

  // floor grid — converging lines
  c.strokeStyle = '#8833cc'; c.lineWidth = .8; c.globalAlpha = 1;
  const FN = 14;
  for (let i = 0; i <= FN; i++) {
    const t = i / FN;
    line(bwl+(bwr-bwl)*t, bwb, W*t, H, .62);
  }
  // floor grid — horizontal (perspective spaced)
  const HN = 12;
  for (let i = 0; i <= HN; i++) {
    const t = Math.pow(i/HN, 1.45);
    const y  = bwb + (H-bwb)*t;
    const x1 = bwl*(1-t), x2 = bwr+(W-bwr)*t;
    line(x1,y,x2,y, .45 + t*.35);
  }

  // ceiling grid
  c.strokeStyle = '#6622aa';
  for (let i = 0; i <= FN; i++) {
    const t = i/FN;
    line(bwl+(bwr-bwl)*t, bwt, W*t, 0, .38);
  }
  for (let i = 0; i <= 6; i++) {
    const t = i/6;
    const y  = bwt*(1-t);
    const x1 = bwl*t, x2 = W-(W-bwr)*t;
    line(x1,y,x2,y, .32);
  }

  // back wall grid
  c.strokeStyle = '#7722bb'; c.lineWidth = .9;
  for (let i = 0; i <= 12; i++) {
    const x = bwl + (bwr-bwl)*i/12;
    line(x,bwt,x,bwb, .55);
  }
  for (let i = 0; i <= 9; i++) {
    const y = bwt + (bwb-bwt)*i/9;
    line(bwl,y,bwr,y, .55);
  }

  // side wall lines
  c.strokeStyle = '#4411aa';
  for (let i = 1; i < 6; i++) {
    const t = i/6;
    line(bwl, bwt+(bwb-bwt)*t, 0, H*t, .28);
    line(bwr, bwt+(bwb-bwt)*t, W, H*t, .28);
  }

  c.globalAlpha = 1;

  // central glow on back wall
  const gl = c.createRadialGradient(W/2,(bwt+bwb)/2,0, W/2,(bwt+bwb)/2,W*.55);
  gl.addColorStop(0,'#ee55ff1a'); gl.addColorStop(.5,'#9933ff0d'); gl.addColorStop(1,'transparent');
  c.fillStyle = gl; c.fillRect(0,0,W,H);

  // side ambient (cyan tinge)
  const glL = c.createRadialGradient(0,H*.5,0, 0,H*.5,W*.25);
  glL.addColorStop(0,'#0055ff0e'); glL.addColorStop(1,'transparent');
  c.fillStyle = glL; c.fillRect(0,0,W,H);
  const glR = c.createRadialGradient(W,H*.5,0, W,H*.5,W*.25);
  glR.addColorStop(0,'#0055ff0e'); glR.addColorStop(1,'transparent');
  c.fillStyle = glR; c.fillRect(0,0,W,H);
}

// ── Physics ──────────────────────────────────────────────────────
const { Engine, World, Bodies, Body, Events, Mouse, MouseConstraint, Query } = Matter;
const engine = Engine.create({ gravity: { y: 1.8 } });
const world  = engine.world;

World.add(world, [
  Bodies.rectangle(W/2, H+25,  W*3, 50,  { isStatic:true, friction:0.85, frictionStatic:1.0 }),
  Bodies.rectangle(-25,  H/2,  50,  H*3, { isStatic:true, friction:0.5 }),
  Bodies.rectangle(W+25, H/2,  50,  H*3, { isStatic:true, friction:0.5 }),
  Bodies.rectangle(W/2,  15,   W*3, 60,  { isStatic:true }), // ceiling (bottom edge ≈ y=45)
]);

const mouse = Mouse.create(fgC);
const mc = MouseConstraint.create(engine, {
  mouse,
  constraint: { stiffness: .04, damping: .12, render: { visible: false } }
});
World.add(world, mc);

// ── Audio (Web Audio API synthesis) ─────────────────────────────
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

function synthTone(freq0, freq1, dur, vol, type = 'sine') {
  const a = getAC(), t = a.currentTime;
  const osc = a.createOscillator(), g = a.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq0, t);
  osc.frequency.exponentialRampToValueAtTime(freq1, t + dur);
  g.gain.setValueAtTime(Math.min(vol, 1), t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(g); g.connect(a.destination);
  osc.start(t); osc.stop(t + dur);
}

function synthNoise(dur, cutoff, vol, delay = 0) {
  const a = getAC(), t = a.currentTime + delay;
  const len = Math.ceil(a.sampleRate * dur);
  const buf = a.createBuffer(1, len, a.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  const src = a.createBufferSource(); src.buffer = buf;
  const lp  = a.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = cutoff;
  const g   = a.createGain();
  g.gain.setValueAtTime(Math.min(vol, 1), t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(lp); lp.connect(g); g.connect(a.destination);
  src.start(t); src.stop(t + dur);
}

function playBowlingThud(vol) {
  const v = Math.max(0.15, vol);
  synthTone(95, 28, 0.6, v * 1.4);
  synthNoise(0.1, 280, v * 0.7);
  synthNoise(0.2, 100, v * 0.4, 0.02);
}

function playBasketballBounce(vol) {
  const v = Math.max(0.08, vol);
  synthTone(240, 68, 0.2, v * 0.9);
  synthNoise(0.05, 900, v * 0.35);
}

function playBallCollision(vol) {
  const v = Math.max(0.08, vol);
  synthTone(380, 160, 0.14, v * 0.8);
  synthNoise(0.07, 1400, v * 0.5);
}

function playFruitThud(vol) {
  synthTone(140, 55, 0.28, Math.max(0.05, vol) * 0.7);
}

function playExplosion() {
  synthNoise(0.07, 8000, 0.75);               // initial crack
  synthTone(85, 20, 1.0, 0.95, 'sawtooth');   // deep belly boom
  synthNoise(0.55, 380, 0.80, 0.03);          // rumble body
  synthNoise(0.22, 75,  0.55, 0.12);          // low thud tail
}

// per-body cooldown to avoid sound spam when resting
const _soundCD = new WeakMap();
function canSound(body) {
  const now = Date.now();
  if (now - (_soundCD.get(body) || 0) < 120) return false;
  _soundCD.set(body, now);
  return true;
}

Events.on(engine, 'collisionStart', (event) => {
  for (const { bodyA, bodyB } of event.pairs) {
    const speed = Math.hypot(
      bodyA.velocity.x - bodyB.velocity.x,
      bodyA.velocity.y - bodyB.velocity.y
    );
    if (speed < 1.5) continue;
    const vol = Math.min(speed / 22, 1);

    if (bodyA.isStatic || bodyB.isStatic) {
      const b = bodyA.isStatic ? bodyB : bodyA;
      if (!canSound(b)) continue;
      if      (b.label === 'bowling')    playBowlingThud(vol);
      else if (b.label === 'basketball') playBasketballBounce(vol);
      else if (b.label === 'banana')     playFruitThud(vol);
    } else {
      const b = bodyA;
      if (!canSound(b)) continue;
      playBallCollision(vol);
    }
  }
});

// ── Drawing state ────────────────────────────────────────────────
let drawing = false, pts = [];
const objs = [];
const mPos = { x: 0, y: 0 };

fgC.addEventListener('mousemove', e => {
  mPos.x = e.clientX; mPos.y = e.clientY;
  if (drawing) pts.push({ x: e.clientX, y: e.clientY });
});

fgC.addEventListener('mousedown', e => {
  const hit = Query.point(objs.map(o => o.body), { x: e.clientX, y: e.clientY });
  if (!hit.length) { drawing = true; pts = [{ x: e.clientX, y: e.clientY }]; }
});

fgC.addEventListener('mouseup',    endDraw);
fgC.addEventListener('mouseleave', endDraw);

function endDraw() {
  if (!drawing) return;
  drawing = false;
  if (pts.length > 6) {
    const res = recognize(pts);
    if (res) spawn(res);
  }
  pts = [];
}

// ── Shape recognition ────────────────────────────────────────────
function recognize(pts) {
  const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  const y0 = Math.min(...ys), y1 = Math.max(...ys);
  const bw = x1-x0, bh = y1-y0;
  const cx = (x0+x1)/2, cy = (y0+y1)/2;
  const diag = Math.hypot(bw, bh);

  let perim = 0;
  for (let i = 1; i < pts.length; i++)
    perim += Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y);

  // reject tiny or accidental strokes
  if (perim < 70 || diag < 35) return null;

  // closure: start and end within 38% of diagonal
  const d0 = Math.hypot(pts[0].x - pts[pts.length-1].x, pts[0].y - pts[pts.length-1].y);
  const closed = d0 < diag * 0.38;

  // open stroke (arc, curve, crescent) → banana
  if (!closed) return { type:'banana', cx, cy, bw, bh };

  // closed stroke → determine ball
  let area = 0;
  for (let i = 0; i < pts.length; i++) {
    const j = (i+1) % pts.length;
    area += pts[i].x*pts[j].y - pts[j].x*pts[i].y;
  }
  area = Math.abs(area) / 2;
  const circ = (4*Math.PI*area) / (perim*perim);
  const elong = Math.max(bw,bh) / (Math.min(bw,bh) || 1);

  // closed but very elongated (like a horizontal oval traced back) → banana
  if (elong > 2.8 && circ < 0.35) return { type:'banana', cx, cy, bw, bh };

  // closed + very spiky (low circularity) → boom
  if (circ < 0.40) return { type:'boom', cx, cy, r: Math.min(Math.max(diag / 2, 40), 160) };

  return { type:'ball', cx, cy, r: 85 };
}

// ── Spawn objects ────────────────────────────────────────────────
function showHint(text) {
  const el = document.getElementById('hint');
  el.textContent = text; el.classList.add('pop');
  setTimeout(() => { el.textContent = 'draw a shape'; el.classList.remove('pop'); }, 2400);
}

function spawnBoom(shape) {
  playExplosion();
  showHint('BOOM!');

  // Blast every physics object outward from explosion centre
  const blastR = Math.max(shape.r * 2.8, 220);
  for (const o of objs) {
    const dx = o.body.position.x - shape.cx;
    const dy = o.body.position.y - shape.cy;
    const dist = Math.hypot(dx, dy) || 1;
    const falloff = Math.max(0, 1 - dist / blastR);
    if (falloff > 0) {
      const speed = 160 * falloff;
      Body.setVelocity(o.body, {
        x: o.body.velocity.x + (dx / dist) * speed,
        y: o.body.velocity.y + (dy / dist) * speed - 25 * falloff,
      });
    }
  }

  // GIF overlay — cache-bust src so animation always restarts from frame 1
  const size = Math.max(shape.r * 3.8, 240);
  const el   = document.createElement('img');
  el.src     = 'assets/explosion.gif';
  Object.assign(el.style, {
    position: 'fixed', zIndex: '5', pointerEvents: 'none',
    width: size + 'px', height: size + 'px',
    left: (shape.cx - size / 2) + 'px',
    top:  (shape.cy - size / 2) + 'px',
    opacity: '1', transition: 'opacity 0.35s',
  });
  document.body.appendChild(el);
  const fadeAt = Math.max(BOOM_DURATION - 320, 400);
  setTimeout(() => { el.style.transition = 'opacity 0.28s'; el.style.opacity = '0'; }, fadeAt);
  setTimeout(() => el.remove(), fadeAt + 320);
}

function spawn(shape) {
  if (shape.type === 'boom') {
    spawnBoom(shape);
    return;
  }
  if (shape.type === 'ball') {
    const bowling = Math.random() < .5;
    const body = Bodies.circle(shape.cx, shape.cy, shape.r, {
      restitution: bowling ? .04  : .80,
      friction:    bowling ? .85  : .55,
      frictionAir: bowling ? .003 : .007,
      density:     bowling ? .030 : .0018,
      label:       bowling ? 'bowling' : 'basketball',
    });
    World.add(world, body);
    objs.push({ body, type: bowling ? 'bowling' : 'basketball', r: shape.r });
    showHint(bowling ? 'bowling ball' : 'basketball');

  } else {
    // Fixed dimensions — BH controls crescent depth, needs to be tall enough to curve
    const BW = 130, BH = 58;
    const body = Bodies.rectangle(shape.cx, shape.cy, BW * 0.85, BH * 0.48, {
      restitution: .22, friction: .80, frictionAir: .012,
      density: .0008, label: 'banana',
    });
    World.add(world, body);
    objs.push({ body, type: 'banana', bw: BW, bh: BH });
    showHint('banana');
  }
}

// ── Image assets ──────────────────────────────────────────────────
const IMGS = {};
['banana', 'bowling', 'basketball'].forEach(n => {
  IMGS[n] = Object.assign(new Image(), { src: 'assets/' + n + '.png' });
});
function imgReady(name) { return IMGS[name].complete && IMGS[name].naturalWidth > 0; }

// Parse explosion.gif frame delays so the fade-out lands exactly before the loop.
// Falls back to 1400ms if fetch isn't available (e.g. file:// protocol).
let BOOM_DURATION = 1400;
fetch('assets/explosion.gif').then(r => r.arrayBuffer()).then(buf => {
  const b = new Uint8Array(buf);
  let ms = 0, i = 13 + ((b[10] >> 7) ? 3 << ((b[10] & 7) + 1) : 0);
  while (i < b.length) {
    if (b[i] === 0x3B) break;
    if (b[i] === 0x21 && b[i + 1] === 0xF9) {
      ms += (b[i + 4] | (b[i + 5] << 8)) * 10; // centiseconds → ms
      i += 8;
    } else if (b[i] === 0x21) {
      i += 2; while (b[i]) i += b[i] + 1; i++;
    } else if (b[i] === 0x2C) {
      const lct = (b[i + 9] >> 7) ? 3 << ((b[i + 9] & 7) + 1) : 0;
      i += 10 + lct + 1; while (b[i]) i += b[i] + 1; i++;
    } else i++;
  }
  if (ms > 100) BOOM_DURATION = ms;
}).catch(() => {});

// ── Object renderers ─────────────────────────────────────────────
function drawBasketball(c, x, y, r, a) {
  c.save(); c.translate(x, y); c.rotate(a);
  c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.clip();
  if (imgReady('basketball')) c.drawImage(IMGS.basketball, -r, -r, r * 2, r * 2);
  c.restore();
}

function drawBowlingBall(c, x, y, r, a) {
  c.save(); c.translate(x, y); c.rotate(a);
  c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.clip();
  if (imgReady('bowling')) c.drawImage(IMGS.bowling, -r, -r, r * 2, r * 2);
  c.restore();
}

function drawBanana(c, x, y, bw, bh, a) {
  c.save(); c.translate(x, y); c.rotate(a);
  const hw = bw * 0.5, bend = bh, fat = bh * 0.46;
  // Clip to a generous crescent: tips raised to -bend*0.4 and clip wider
  // than the image so the banana photo never gets cut at its endpoints.
  const ex   = hw  * 1.1;   // slightly wider than image
  const tipY = -bend * 0.40; // tips well above equator
  c.beginPath();
  c.moveTo(-ex, tipY);
  c.bezierCurveTo(-ex * 0.42, -(bend * 1.55), ex * 0.42, -(bend * 1.55), ex, tipY);
  c.bezierCurveTo( ex * 0.50,  fat  * 1.55, -ex * 0.50,  fat  * 1.55, -ex, tipY);
  c.closePath();
  c.clip();
  if (imgReady('banana')) c.drawImage(IMGS.banana, -hw, -bend, bw, bend + fat);
  c.restore();
}

// ── Render loop ───────────────────────────────────────────────────
let lastT = 0;
const prevMouse = { x: 0, y: 0 };

function loop(t) {
  const dt = Math.min(t - lastT, 33);
  lastT = t;
  Engine.update(engine, dt);

  // Smooth hang: when mouse is held still, bleed off spring oscillation
  if (mc.body) {
    const moved = Math.hypot(mPos.x - prevMouse.x, mPos.y - prevMouse.y);
    if (moved < 1.5) {
      Body.setVelocity(mc.body, {
        x: mc.body.velocity.x * 0.55,
        y: mc.body.velocity.y * 0.55,
      });
    }
  }
  prevMouse.x = mPos.x; prevMouse.y = mPos.y;

  gx.clearRect(0, 0, W, H);

  // in-progress stroke
  if (pts.length > 1) {
    gx.save();
    gx.strokeStyle = '#ff71ce'; gx.lineWidth = 2.5;
    gx.lineCap = 'round'; gx.lineJoin = 'round';
    gx.shadowColor = '#ff71ce'; gx.shadowBlur = 10;
    gx.beginPath(); gx.moveTo(pts[0].x, pts[0].y);
    for (const p of pts) gx.lineTo(p.x, p.y);
    gx.stroke(); gx.restore();
  }

  // physics objects
  for (const o of objs) {
    const { x, y } = o.body.position, a = o.body.angle;
    if      (o.type === 'basketball') drawBasketball(gx, x, y, o.r, a);
    else if (o.type === 'bowling')    drawBowlingBall(gx, x, y, o.r, a);
    else                              drawBanana(gx, x, y, o.bw, o.bh, a);
  }

  // brush cursor
  gx.save();
  gx.strokeStyle = '#ff71ce'; gx.lineWidth = 1.5;
  gx.shadowColor = '#ff71ce'; gx.shadowBlur = 8;
  gx.beginPath(); gx.arc(mPos.x, mPos.y, 5, 0, Math.PI*2); gx.stroke();
  gx.beginPath();
  gx.moveTo(mPos.x, mPos.y - 13);
  gx.lineTo(mPos.x + 3, mPos.y - 7);
  gx.lineTo(mPos.x - 3, mPos.y - 7);
  gx.closePath();
  gx.fillStyle = '#ff71ce55'; gx.fill(); gx.stroke();
  gx.restore();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Clear ─────────────────────────────────────────────────────────
document.getElementById('clearBtn').addEventListener('click', () => {
  for (const o of objs) World.remove(world, o.body);
  objs.length = 0;
});
</script>
</body>
</html>
